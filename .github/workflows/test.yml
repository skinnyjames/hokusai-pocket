name: test
on: push
jobs:
  test-linux-arm64:
    runs-on: ubuntu-22.04-arm
    container:
      image: alpine:latest
    steps:
      - name: deps
        run: apk add git make cmake automake libtool ruby wget clang alsa-lib-dev eudev-dev jack-dev libdecor-dev libsamplerate-dev libusb-dev libx11-dev libxcursor-dev libxext-dev libxi-dev libxkbcommon-dev libxrandr-dev libxrender-dev libxscrnsaver-dev libxtst-dev pipewire-dev pulseaudio-dev samurai wayland-dev wayland-protocols mesa-dev
      - uses: laverdet/alpine-arm64@v1
      - uses: actions/checkout@v5
      - uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: 'skinnyjames/mruby-bin-barista'
          version: 'tags/0.3.1'
          file: 'barista-linux-arm64.tar.gz'
          target: 'barista.tar.gz'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: unpack barista
        run: tar -xvf barista.tar.gz --strip-components 1
      - name: gem install rake
        run: gem install rake
      - name: build pocket
        run: chmod 755 barista && ./barista @mobile
      - name: test
        run: ./bin/hokusai-pocket run:target=test/entrypoint.rb
      - uses: actions/upload-artifact@v4
        with:
          name: hokusai-pocket-linux-test-arm64
          path: bin/hokusai-pocket
          overwrite: true
  test-linux:
    runs-on: ubuntu-latest
    container:
      image: ubuntu:latest
    steps:
      - name: deps
        run: apt-get update -y && apt-get install -y git wget cmake automake libtool ruby clang build-essential libasound2-dev libgl1-mesa-dev libglu1-mesa-dev libx11-dev libxi-dev libxrandr-dev mesa-common-dev xorg-dev
      - uses: actions/checkout@v5
      - uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: 'skinnyjames/mruby-bin-barista'
          version: 'tags/0.3.1'
          file: 'barista-linux-x86.tar.gz'
          target: 'barista.tar.gz'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: unpack barista
        run: tar -xvf barista.tar.gz --strip-components 1
      - name: build pocket
        run: chmod 755 barista && ./barista @desktop
      - name: test
        run: bin/hokusai-pocket run:target=test/entrypoint.rb
      - uses: actions/upload-artifact@v4
        with:
          name: hokusai-pocket-linux-test
          path: bin/hokusai-pocket
          overwrite: true
  test-osx:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5
      - uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: 'skinnyjames/mruby-bin-barista'
          version: 'tags/0.3.1'
          file: 'barista-osx-x86.tar.gz'
          target: 'barista.tar.gz'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: unpack barista
        run: tar -xvf barista.tar.gz --strip-components 1
      - name: deps
        run: brew install automake wget
      - name: build pocket
        run: chmod 755 barista && ./barista @desktop
        shell: bash
      - name: test
        run: bin/hokusai-pocket run:target=test/entrypoint.rb
      - uses: actions/upload-artifact@v4
        with:
          name: hokusai-pocket-osx-test
          path: bin/hokusai-pocket
          overwrite: true
  test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Setup Ninja
        uses: ashutoshvarma/setup-ninja@master
        with:
          version: 1.10.0
      - uses: dsaltares/fetch-gh-release-asset@master
        with:
          repo: 'skinnyjames/mruby-bin-barista'
          version: 'tags/0.3.1'
          file: 'barista-windows-x86.tar.gz'
          target: 'barista.tar.gz'
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: unpack barista
        run: tar -xvf barista.tar.gz --strip-components 1
      - name: build pocket
        run: chmod 755 barista && ./barista @desktop
        shell: bash
      - name: test
        run: bin/hokusai-pocket run:target=test/entrypoint.rb
      - uses: actions/upload-artifact@v4
        with:
          name: hokusai-pocket-windows-test
          path: bin/hokusai-pocket
          overwrite: true